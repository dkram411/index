<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBA Accounting Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0c2340, #e87722);
  margin: 0;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 95%;
  max-width: 1000px;
  margin: 20px auto;
}

.dashboard {
  background: #f4f4f4;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #0c2340;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container" id="game"></div>

<script>

let round = 1;
const maxRounds = 8;

let history = { profit: [] };

let state = {
  price: 50,
  variableCost: 30,
  fixedCost: 10000,
  inventory: 200,
  cash: 50000
};

function calc(produce, marketing) {
  let demand = Math.floor(Math.random()*400)+300 + marketing/10;
  let sold = Math.min(state.inventory, demand);

  let revenue = sold * state.price;
  let cogs = sold * state.variableCost;
  let profit = revenue - cogs - state.fixedCost;

  state.inventory += produce - sold;
  state.cash += profit - produce*state.variableCost - marketing;

  history.profit.push(profit);

  return { revenue, cogs, profit, demand, sold };
}

function cmMetrics() {
  let cm = state.price - state.variableCost;
  let ratio = cm / state.price;
  return { cm, ratio };
}

function intro() {
  document.getElementById("game").innerHTML = `
    <h1>MBA Accounting Simulator</h1>

    <h3>Learning Objectives</h3>
    <ul>
      <li>Use contribution margin in decisions</li>
      <li>Analyze break-even visually</li>
      <li>Compare decisions vs optimal strategy</li>
    </ul>

    <button onclick="decision()">Start</button>
  `;
}

function decision() {
  let cm = cmMetrics();

  document.getElementById("game").innerHTML = `
    <h2>Round ${round}</h2>

    <div class="dashboard">
      CM per Unit: $${cm.cm} |
      CM Ratio: ${(cm.ratio*100).toFixed(1)}%
    </div>

    <label>Price:</label>
    <input id="price" type="number" value="${state.price}">

    <label>Units to Produce:</label>
    <input id="produce" type="number" value="200">

    <label>Marketing Spend:</label>
    <input id="marketing" type="number" value="0">

    <button onclick="run()">Run Round</button>

    <canvas id="beChart"></canvas>
  `;

  renderBEChart();
}

function renderBEChart() {

  let labels = [];
  let revenueLine = [];
  let costLine = [];

  let cm = state.price - state.variableCost;

  for(let i=0;i<=1000;i+=50){
    labels.push(i);
    revenueLine.push(i*state.price);
    costLine.push(state.fixedCost + i*state.variableCost);
  }

  new Chart(document.getElementById("beChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: "Revenue", data: revenueLine },
        { label: "Total Cost", data: costLine }
      ]
    }
  });
}

function run() {

  let userPrice = Number(document.getElementById("price").value);
  let produce = Number(document.getElementById("produce").value);
  let marketing = Number(document.getElementById("marketing").value);

  state.price = userPrice;

  let result = calc(produce, marketing);

  let cm = state.price - state.variableCost;

  // Optimal Strategy Logic
  let optimal = "";
  if(cm > 20 && result.sold < result.demand) {
    optimal = "Increase production — you had unmet demand.";
  } else if(cm < 10) {
    optimal = "Increase price — margins are too low.";
  } else if(produce > result.demand) {
    optimal = "Reduce production — excess inventory ties up cash.";
  } else {
    optimal = "Solid strategy — balanced margin and demand.";
  }

  showResults(result, optimal, userPrice, produce);
}

function showResults(data, optimal, price, produce) {

  document.getElementById("game").innerHTML = `
    <h2>Round ${round} Results</h2>

    <div class="dashboard">
      Revenue: $${Math.round(data.revenue)} |
      Profit: $${Math.round(data.profit)} |
      Units Sold: ${data.sold}
    </div>

    <canvas id="profitChart"></canvas>

    <h3>Decision Feedback</h3>
    <p><b>Your Decision:</b> Price $${price}, Produced ${produce}</p>
    <p><b>Optimal Strategy:</b> ${optimal}</p>

    <p>
    <b>Explanation:</b><br>
    Strong decisions maximize contribution margin while aligning production with demand.
    Overproduction wastes cash, while underproduction misses profit opportunities.
    </p>

    <button onclick="next()">Next Round</button>
  `;

  new Chart(document.getElementById("profitChart"), {
    type: 'line',
    data: {
      labels: history.profit.map((_, i)=>"R"+(i+1)),
      datasets: [{ label: "Profit Trend", data: history.profit }]
    }
  });
}

function next() {
  round++;
  if(round > maxRounds) end();
  else decision();
}

function end() {

  let total = history.profit.reduce((a,b)=>a+b,0);

  document.getElementById("game").innerHTML = `
    <h1>Simulation Complete</h1>
    <h2>Total Profit: $${Math.round(total)}</h2>

    <canvas id="finalChart"></canvas>

    <p>
    Top performers balanced pricing power, cost control, and demand forecasting.
    </p>

    <button onclick="restart()">Play Again</button>
  `;

  new Chart(document.getElementById("finalChart"), {
    type: 'line',
    data: {
      labels: history.profit.map((_, i)=>"R"+(i+1)),
      datasets: [{ label: "Final Profit", data: history.profit }]
    }
  });
}

function restart() {
  round = 1;
  history = { profit: [] };
  state = {
    price: 50,
    variableCost: 30,
    fixedCost: 10000,
    inventory: 200,
    cash: 50000
  };
  intro();
}

intro();

</script>
</body>
</html>
