<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBA Decision Lab</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0c2340, #e87722);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 95%;
  max-width: 750px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1, h2 {
  text-align: center;
}

.dashboard {
  background: #f4f4f4;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #0c2340;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #091a30;
}
</style>
</head>

<body>

<div class="container" id="game"></div>

<script>
let round = 0;

let state = {
  price: 50,
  volume: 1000,
  variableCost: 30,
  fixedCost: 20000,
  capacity: 1500
};

function calculateProfit() {
  let revenue = state.price * state.volume;
  let vc = state.variableCost * state.volume;
  let cm = revenue - vc;
  let profit = cm - state.fixedCost;

  return { revenue, vc, cm, profit };
}

const scenarios = [

{
title: "Pricing Decision",
desc: "Demand dropped. You can lower price to increase volume.",
options: [
{label: "Lower price to $45 (volume +300)", action: () => {state.price=45; state.volume+=300;}, explanation:"Lower price increased demand but reduced CM per unit."},
{label: "Keep price at $50", action: () => {}, explanation:"Stable pricing maintains margin but limits growth."}
]
},

{
title: "Special Order",
desc: "A buyer offers $35/unit for 400 units. Capacity available.",
options: [
{label: "Accept Order", action: () => {state.volume+=400;}, explanation:"Price > VC → positive contribution margin."},
{label: "Reject Order", action: () => {}, explanation:"You missed additional profit from idle capacity."}
]
},

{
title: "Cost Structure Change",
desc: "Automation increases fixed cost but lowers VC.",
options: [
{label: "Automate (FC +5000, VC -5)", action: () => {state.fixedCost+=5000; state.variableCost-=5;}, explanation:"Higher FC increases risk but improves margins."},
{label: "Stay Manual", action: () => {}, explanation:"Lower risk but less scalable."}
]
},

{
title: "Capacity Constraint",
desc: "You are at full capacity. A new order arrives.",
options: [
{label: "Accept low-margin order", action: () => {state.price=40;}, explanation:"You displaced higher-margin sales → bad decision."},
{label: "Reject order", action: () => {}, explanation:"Correct: capacity should prioritize highest CM."}
]
},

{
title: "Break-even Strategy",
desc: "You need to reach profitability.",
options: [
{label: "Increase volume via marketing (+500 units, FC +2000)", action: () => {state.volume+=500; state.fixedCost+=2000;}, explanation:"Higher volume spreads fixed costs."},
{label: "Do nothing", action: () => {}, explanation:"Profitability remains unchanged."}
]
}

];

function showIntro() {
  document.getElementById("game").innerHTML = `
    <h1>MBA Decision Lab</h1>
    <p><b>Your Role:</b> CEO making strategic accounting decisions</p>

    <h2>Learning Objectives</h2>
    <ul>
      <li>Use contribution margin in decisions</li>
      <li>Apply break-even thinking dynamically</li>
      <li>Evaluate relevant vs irrelevant costs</li>
      <li>Understand capacity constraints</li>
    </ul>

    <button onclick="nextRound()">Start Simulation</button>
  `;
}

function renderDashboard() {
  let f = calculateProfit();

  return `
    <div class="dashboard">
      Revenue: $${f.revenue} |
      Variable Cost: $${f.vc} |
      CM: $${f.cm} |
      Fixed Cost: $${state.fixedCost} |
      <b>Profit: $${f.profit}</b>
    </div>
  `;
}

function nextRound() {
  if (round >= scenarios.length) {
    endGame();
    return;
  }

  let s = scenarios[round];

  document.getElementById("game").innerHTML = `
    ${renderDashboard()}
    <h2>${s.title}</h2>
    <p>${s.desc}</p>

    ${s.options.map((o,i)=>`
      <button onclick="choose(${i})">${o.label}</button>
    `).join("")}
  `;
}

function choose(i) {
  let s = scenarios[round];
  s.options[i].action();

  let f = calculateProfit();

  document.getElementById("game").innerHTML = `
    <h2>Decision Outcome</h2>
    <p>${s.options[i].explanation}</p>

    ${renderDashboard()}

    <button onclick="continueGame()">Next Decision</button>
  `;
}

function continueGame() {
  round++;
  nextRound();
}

function endGame() {
  let f = calculateProfit();

  let message = "Needs Improvement";
  if (f.profit > 15000) message = "Excellent Strategic Thinking!";
  else if (f.profit > 5000) message = "Good Performance";

  document.getElementById("game").innerHTML = `
    <h1>Simulation Complete</h1>
    <h2>Final Profit: $${f.profit}</h2>
    <p>${message}</p>

    <button onclick="restart()">Play Again</button>
  `;
}

function restart() {
  round = 0;
  state = {
    price: 50,
    volume: 1000,
    variableCost: 30,
    fixedCost: 20000,
    capacity: 1500
  };
  showIntro();
}

showIntro();
</script>

</body>
</html>
