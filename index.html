<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MBA Accounting Game</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0c2340;
  color: white;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 6px;
  background: #e87722;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

//////////////////////////////////////////////////////
// HOME + OBJECTIVES
//////////////////////////////////////////////////////

function home() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h1>Accounting Learning Game</h1>

      <h3>Learning Objectives</h3>
      <ul>
        <li>Understand financial statements</li>
        <li>Apply cost behavior & break-even analysis</li>
        <li>Analyze budgeting and variance</li>
        <li>Make managerial accounting decisions</li>
      </ul>

      <h3>Select Mode</h3>
      <button onclick="flashcards()">Flashcards</button>
      <button onclick="quiz()">Multiple Choice</button>
      <button onclick="fillBlank()">Fill in the Blank</button>
      <button onclick="simulation()">Simulation Game</button>
      <button onclick="analysis()">Data Analysis</button>
    </div>
  `;
}

//////////////////////////////////////////////////////
// FLASHCARDS
//////////////////////////////////////////////////////

let flashIndex = 0;
const flashcardsData = [
  {q:"What is Revenue?", a:"Money earned from sales"},
  {q:"Contribution Margin?", a:"Price - Variable Cost"},
  {q:"Break-even formula?", a:"Fixed Cost / CM per unit"},
  {q:"Variance?", a:"Actual - Budget"},
  {q:"Inventory?", a:"Goods available for sale"}
];

function flashcards() {
  let card = flashcardsData[flashIndex];

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Flashcards</h2>
      <p><b>${card.q}</b></p>
      <button onclick="alert('${card.a}')">Show Answer</button>
      <button onclick="nextFlash()">Next</button>
    </div>
  `;
}

function nextFlash() {
  flashIndex = (flashIndex + 1) % flashcardsData.length;
  flashcards();
}

//////////////////////////////////////////////////////
// MULTIPLE CHOICE
//////////////////////////////////////////////////////

function quiz() {

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Multiple Choice</h2>

      <p>Break-even increases when:</p>

      <button onclick="feedback(false)">Variable cost decreases</button>
      <button onclick="feedback(true)">Fixed cost increases</button>

      <div id="fb"></div>
    </div>
  `;
}

function feedback(correct) {
  document.getElementById("fb").innerHTML = correct
    ? "<p style='color:green'>Correct! Higher fixed costs require more units.</p>"
    : "<p style='color:red'>Incorrect. Lower VC reduces break-even.</p>";
}

//////////////////////////////////////////////////////
// FILL IN BLANK
//////////////////////////////////////////////////////

function fillBlank() {

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Fill in the Blank</h2>

      <p>Contribution Margin = Price - ______</p>

      <input id="ans">
      <button onclick="checkFill()">Submit</button>

      <div id="fillfb"></div>
    </div>
  `;
}

function checkFill() {
  let ans = document.getElementById("ans").value.toLowerCase();

  if(ans.includes("variable")) {
    document.getElementById("fillfb").innerHTML =
      "<p style='color:green'>Correct! Variable cost is subtracted.</p>";
  } else {
    document.getElementById("fillfb").innerHTML =
      "<p style='color:red'>Incorrect. It is variable cost.</p>";
  }
}

//////////////////////////////////////////////////////
// SIMULATION (CORE GAME)
//////////////////////////////////////////////////////

let state = {
  cash: 20000,
  inventory: 100,
  price: 50,
  variableCost: 25,
  fixedCost: 4000
};

let history = [];

function simulation() {

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Simulation</h2>

      <p>Cash: $${state.cash} | Inventory: ${state.inventory}</p>

      <button onclick="buy()">Buy Inventory</button>
      <button onclick="raisePrice()">Increase Price</button>
      <button onclick="runSim()">Run Period</button>
    </div>
  `;
}

function buy() {
  state.inventory += 100;
  state.cash -= 2500;
  simulation();
}

function raisePrice() {
  state.price += 5;
  simulation();
}

function runSim() {

  let demand = Math.floor(Math.random()*200)+100;
  let sold = Math.min(state.inventory, demand);

  let revenue = sold * state.price;
  let cost = sold * state.variableCost + state.fixedCost;

  let profit = revenue - cost;

  state.cash += profit;
  state.inventory -= sold;

  history.push(profit);

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Results</h2>

      <p>Revenue: $${revenue}</p>
      <p>Cost: $${cost}</p>
      <p><b>Profit: $${profit}</b></p>

      <p>
      Profit depends on contribution margin and volume.
      </p>

      <canvas id="chart"></canvas>

      <button onclick="simulation()">Continue</button>
    </div>
  `;

  new Chart(document.getElementById("chart"), {
    type:'line',
    data:{
      labels:history.map((_,i)=>"R"+(i+1)),
      datasets:[{label:"Profit", data:history}]
    }
  });
}

//////////////////////////////////////////////////////
// DATA ANALYSIS MODE
//////////////////////////////////////////////////////

function analysis() {

  let revenue = [5000,7000,8000];
  let cost = [4000,5000,6000];

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Data Analysis</h2>

      <p>Interpret the chart below.</p>

      <canvas id="analysisChart"></canvas>

      <p>
      Insight: Profit increases when revenue grows faster than cost.
      </p>
    </div>
  `;

  new Chart(document.getElementById("analysisChart"), {
    type:'bar',
    data:{
      labels:["Q1","Q2","Q3"],
      datasets:[
        {label:"Revenue", data:revenue},
        {label:"Cost", data:cost}
      ]
    }
  });
}

home();

</script>
</body>
</html>
