<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accounting Simulation Lab</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #0c2340;
  margin: 0;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 12px;
}

.full {
  grid-column: span 2;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  background: #e87722;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.metric {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

let state = {
  cash: 20000,
  inventory: 100,
  price: 50,
  variableCost: 25,
  fixedCost: 4000,
  loan: 5000
};

let history = [];
let round = 1;
let stage = 1;

function render() {

  document.getElementById("app").innerHTML = `
    <div class="header">
      <h1>Accounting Simulation Lab</h1>
      <p>Run a business. Learn accounting through decisions.</p>
    </div>

    <div class="grid">

      <div class="card">
        <h3>📊 Financial Dashboard</h3>
        <div class="metric"><span>Cash</span><span>$${state.cash}</span></div>
        <div class="metric"><span>Inventory</span><span>${state.inventory}</span></div>
        <div class="metric"><span>Price</span><span>$${state.price}</span></div>
        <div class="metric"><span>Variable Cost</span><span>$${state.variableCost}</span></div>
      </div>

      <div class="card">
        <h3>🧠 Narration</h3>
        <p>${getNarration()}</p>
      </div>

      <div class="card">
        <h3>⚙️ Your Decisions</h3>
        <button onclick="buyInventory()">Buy Inventory (+100 units)</button>
        <button onclick="increasePrice()">Increase Price (+$5)</button>
        <button onclick="decreasePrice()">Decrease Price (-$5)</button>
        <button onclick="marketing()">Marketing Spend ($1,000)</button>
        <button onclick="run()">Run Quarter</button>
      </div>

      <div class="card">
        <h3>📘 Concepts</h3>
        <p><b>Contribution Margin:</b> Price - Variable Cost</p>
        <p><b>Profit:</b> Revenue - Total Costs</p>
        <p><b>Break-even:</b> When profit = 0</p>
      </div>

      <div class="card full">
        <h3>📈 Performance Trend</h3>
        <canvas id="chart"></canvas>
      </div>

    </div>
  `;

  renderChart();
}

function getNarration() {

  let cm = state.price - state.variableCost;

  if(round === 1) {
    return "Welcome! Start by making basic operating decisions like buying inventory and setting price.";
  }

  if(cm < 10) {
    return "Your margins are low. Consider increasing price or reducing costs.";
  }

  if(state.inventory > 300) {
    return "You are holding too much inventory. This ties up cash unnecessarily.";
  }

  return "You're balancing operations well. Focus on aligning production with demand.";
}

function buyInventory() {
  state.inventory += 100;
  state.cash -= 2500;
  render();
}

function increasePrice() {
  state.price += 5;
  render();
}

function decreasePrice() {
  state.price -= 5;
  render();
}

function marketing() {
  state.cash -= 1000;
  state.marketing = 100;
  render();
}

function run() {

  let demand = Math.floor(Math.random()*200)+100 + (state.marketing || 0);

  let sold = Math.min(state.inventory, demand);

  let revenue = sold * state.price;
  let cost = sold * state.variableCost + state.fixedCost;

  let profit = revenue - cost;

  state.cash += profit;
  state.inventory -= sold;

  history.push(profit);

  showResults(revenue, cost, profit, sold, demand);
}

function showResults(revenue, cost, profit, sold, demand) {

  document.getElementById("app").innerHTML = `
    <div class="container">

      <div class="card">
        <h2>📊 Results (Round ${round})</h2>

        <p><b>Units Sold:</b> ${sold} (Demand: ${demand})</p>

        <h3>Income Statement</h3>
        <p>Revenue: $${revenue}</p>
        <p>Expenses: $${cost}</p>
        <p><b>Profit:</b> $${profit}</p>

        <h3>💡 Insight</h3>
        <p>
        Profit depends on contribution margin and volume.
        If demand exceeds supply, you missed sales.
        If inventory is too high, you tied up cash.
        </p>

        <button onclick="next()">Next Round</button>
      </div>

    </div>
  `;

  round++;
}

function next() {
  render();
}

function renderChart() {
  if(!document.getElementById("chart")) return;

  new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: history.map((_,i)=>"R"+(i+1)),
      datasets: [{
        label: "Profit Trend",
        data: history
      }]
    }
  });
}

render();

</script>

</body>
</html>
