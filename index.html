<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accounting Game Hub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0c2340;
  color: white;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  background: #e87722;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

function home() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h1>Accounting Simulation Lab</h1>

      <p>Learn accounting by running simulations, not memorizing rules.</p>

      <h3>Select a Module</h3>

      <button onclick="financials()">Financial Statements</button>
      <button onclick="inventory()">Inventory & Cost Behavior</button>
      <button onclick="breakeven()">Break-even Analysis</button>
      <button onclick="budget()">Budgeting</button>
      <button onclick="variance()">Variance Analysis</button>
      <button onclick="revenue()">Revenue Recognition</button>
      <button onclick="decision()">Managerial Decision Making</button>
    </div>
  `;
}

//////////////////////////////////////////////////////
// 1. FINANCIAL STATEMENTS MODULE
//////////////////////////////////////////////////////
function financials() {

  let cash = 10000;
  let inventory = 0;
  let revenue = 0;

  function render() {
    document.getElementById("app").innerHTML = `
      <div class="card">
        <h2>Financial Statements Lab</h2>

        <p><b>Goal:</b> Understand how transactions affect statements</p>

        <button onclick="buy()">Buy Inventory ($2,000)</button>
        <button onclick="sell()">Sell Goods ($3,000)</button>

        <h3>Income Statement</h3>
        <p>Revenue: $${revenue}</p>

        <h3>Balance Sheet</h3>
        <p>Cash: $${cash}</p>
        <p>Inventory: $${inventory}</p>
      </div>
    `;
  }

  window.buy = function() {
    cash -= 2000;
    inventory += 2000;
    render();
  }

  window.sell = function() {
    inventory -= 1000;
    cash += 3000;
    revenue += 3000;
    render();
  }

  render();
}

//////////////////////////////////////////////////////
// 2. INVENTORY + COST BEHAVIOR
//////////////////////////////////////////////////////
function inventory() {

  let fixed = 5000;
  let variable = 20;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Cost Behavior Lab</h2>

      <p>Fixed costs stay constant. Variable costs change per unit.</p>

      <label>Units:</label>
      <input id="units" type="number" value="100">

      <button onclick="calcCost()">Calculate Cost</button>
    </div>
  `;
}

function calcCost() {
  let u = Number(document.getElementById("units").value);
  let total = 5000 + (20 * u);

  alert("Total Cost = $" + total);
}

//////////////////////////////////////////////////////
// 3. BREAK-EVEN
//////////////////////////////////////////////////////
function breakeven() {

  let price = 50;
  let vc = 30;
  let fc = 10000;

  let be = fc / (price - vc);

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Break-even Simulator</h2>

      <p>Break-even units: <b>${be}</b></p>

      <canvas id="chart"></canvas>
    </div>
  `;

  let labels=[], rev=[], cost=[];
  for(let i=0;i<1000;i+=50){
    labels.push(i);
    rev.push(i*price);
    cost.push(fc + i*vc);
  }

  new Chart(document.getElementById("chart"), {
    type:'line',
    data:{ labels, datasets:[{label:"Revenue",data:rev},{label:"Cost",data:cost}] }
  });
}

//////////////////////////////////////////////////////
// 4. BUDGETING
//////////////////////////////////////////////////////
function budget() {

  let actual = 12000;
  let budget = 10000;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Budgeting Challenge</h2>

      <p>Budget: $${budget}</p>
      <p>Actual: $${actual}</p>

      <p>Were you over or under budget?</p>
    </div>
  `;
}

//////////////////////////////////////////////////////
// 5. VARIANCE
//////////////////////////////////////////////////////
function variance() {

  let actual = 120;
  let standard = 100;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Variance Analysis</h2>

      <p>Actual Units: ${actual}</p>
      <p>Standard Units: ${standard}</p>

      <p>Variance: ${actual - standard}</p>
    </div>
  `;
}

//////////////////////////////////////////////////////
// 6. REVENUE RECOGNITION
//////////////////////////////////////////////////////
function revenue() {

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Revenue Recognition</h2>

      <p>Customer paid but product not delivered.</p>

      <button onclick="alert('Correct: Do NOT recognize revenue yet')">Recognize Revenue</button>
      <button onclick="alert('Correct: Revenue is deferred')">Defer Revenue</button>
    </div>
  `;
}

//////////////////////////////////////////////////////
// 7. DECISION MAKING
//////////////////////////////////////////////////////
function decision() {

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Managerial Decision Lab</h2>

      <p>Special order: Price = $35, VC = $30</p>

      <button onclick="alert('Correct: Accept (positive CM)')">Accept</button>
      <button onclick="alert('Incorrect: Reject loses profit')">Reject</button>
    </div>
  `;
}

home();

</script>
</body>
</html>
